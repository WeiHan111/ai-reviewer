name: "Presubmit - AI Code Review & Fixes"
description: "AI-powered code reviews that detect issues, provide summaries, and suggest auto-fixes on PRs."
author: "Presubmit.ai"
branding:
  icon: "check-square"
  color: "black"
  tags: "ai,code-review,ai-assisted,automation,pull-requests,linting,ci,autofix,devtools"

runs:
  using: "node20"
  main: "dist/index.js"

inputs:
  style_guide_rules:
    required: false
    description: 'Custom style guide rules that will be enforced during review by generating critical comments'
    default: ''
  llm_model:
    required: false
    description: 'LLM model to use for code review (including open-source models like meta-llama/Llama-3.1-8B-Instruct)'
    default: 'gpt-4o-mini'
  llm_provider:
    required: false
    description: 'LLM provider to use (e.g., "fireworks-ai" for Hugging Face models)'
    default: ''