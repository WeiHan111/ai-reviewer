name: AI Reviewer Test

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request_target:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: WeiHan111/ai-reviewer@open_source_models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_API_KEY: ${{ secrets.HF_API_KEY || secrets.LLM_API_KEY }}
          LLM_PROVIDER: fireworks-ai
          LLM_MODEL: meta-llama/Llama-3.1-8B-Instruct
          DEBUG: true
          FORCE_FULL_REVIEW: true
